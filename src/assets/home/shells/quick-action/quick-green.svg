<svg xmlns="http://www.w3.org/2000/svg" width="360" height="160" viewBox="0 0 360 160" fill="none">
      <defs>
        <linearGradient id="surface" x1="0" y1="0" x2="360" y2="160">
          <stop offset="0" stop-color="#18304F" stop-opacity=".98"/>
          <stop offset=".42" stop-color="#081A31" stop-opacity=".98"/>
          <stop offset="1" stop-color="#020914" stop-opacity=".99"/>
        </linearGradient>
        <linearGradient id="rim" x1="0" y1="0" x2="360" y2="160">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity=".78"/>
          <stop offset=".16" stop-color="#22D88A" stop-opacity=".88"/>
          <stop offset=".58" stop-color="#22D88A" stop-opacity=".24"/>
          <stop offset="1" stop-color="#22D88A" stop-opacity=".95"/>
        </linearGradient>
        <radialGradient id="toneGlow" cx=".18" cy=".04" r=".88">
          <stop offset="0" stop-color="#22D88A" stop-opacity=".27"/>
          <stop offset=".52" stop-color="#22D88A" stop-opacity=".07"/>
          <stop offset="1" stop-color="#22D88A" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="wellFill" cx=".30" cy=".10" r=".95">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity=".20"/>
          <stop offset=".30" stop-color="#22D88A" stop-opacity=".19"/>
          <stop offset="1" stop-color="#020A19" stop-opacity=".94"/>
        </radialGradient>
        <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
          <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity=".46"/>
          <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#22D88A" flood-opacity=".42"/>
        </filter>
      </defs>
      <g filter="url(#softShadow)">
        <rect x="8" y="8" width="344" height="144" rx="32"
