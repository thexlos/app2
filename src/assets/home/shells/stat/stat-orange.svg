<svg xmlns="http://www.w3.org/2000/svg" width="220" height="360" viewBox="0 0 220 360" fill="none">
      <defs>
        <linearGradient id="surface" x1="0" y1="0" x2="220" y2="360">
          <stop offset="0" stop-color="#18304F" stop-opacity=".98"/>
          <stop offset=".42" stop-color="#081A31" stop-opacity=".98"/>
          <stop offset="1" stop-color="#020914" stop-opacity=".99"/>
        </linearGradient>
        <linearGradient id="rim" x1="0" y1="0" x2="220" y2="360">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity=".78"/>
          <stop offset=".16" stop-color="#FFB020" stop-opacity=".88"/>
          <stop offset=".58" stop-color="#FFB020" stop-opacity=".24"/>
          <stop offset="1" stop-color="#FFB020" stop-opacity=".95"/>
        </linearGradient>
        <radialGradient id="toneGlow" cx=".18" cy=".04" r=".88">
          <stop offset="0" stop-color="#FFB020" stop-opacity=".27"/>
          <stop offset=".52" stop-color="#FFB020" stop-opacity=".07"/>
          <stop offset="1" stop-color="#FFB020" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="wellFill" cx=".30" cy=".10" r=".95">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity=".20"/>
          <stop offset=".30" stop-color="#FFB020" stop-opacity=".19"/>
          <stop offset="1" stop-color="#020A19" stop-opacity=".94"/>
        </radialGradient>
        <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
          <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity=".46"/>
          <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#FFB020" flood-opacity=".42"/>
        </filter>
      </defs>
      <g filter="url(#softShadow)">
        <rect x="8" y="8" width="204" height="344" rx="34"
              fill="url(#surface)" stroke="url(#rim)" stroke-width="2.2"/>
        <rect x="13" y="13" width="194" height="334" rx="29"
              fill="url(#toneGlow)" stroke="#FFFFFF" stroke-opacity=".09" stroke-width="1"/>
        <path d="M 39 12 H 168"
              stroke="#FFFFFF" stroke-opacity=".32" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M 202 52 V 306"
              stroke="#FFB020" stroke-opacity=".34" stroke-width="2" stroke-linecap="round"/>
        <path d="M 52 345 H 176"
              stroke="#FFB020" stroke-opacity=".50" stroke-width="2.2" stroke-linecap="round"/>
        
        <g>
          <rect x="67" y="40" width="86" height="86" rx="24.1"
                fill="url(#wellFill)" stroke="#FFB020" stroke-opacity=".72" stroke-width="1.4"/>
          <rect x="71" y="44" width="78" height="78" rx="18.9"
                fill="none" stroke="#FFFFFF" stroke-opacity=".10" stroke-width="1"/>
        </g>
        
        
      </g>
    </svg>