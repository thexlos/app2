<svg xmlns="http://www.w3.org/2000/svg" width="140" height="82" viewBox="0 0 140 82" fill="none">
      <defs>
        <linearGradient id="surface" x1="0" y1="0" x2="140" y2="82">
          <stop offset="0" stop-color="#18304F" stop-opacity=".98"/>
          <stop offset=".42" stop-color="#081A31" stop-opacity=".98"/>
          <stop offset="1" stop-color="#020914" stop-opacity=".99"/>
        </linearGradient>
        <linearGradient id="rim" x1="0" y1="0" x2="140" y2="82">
          <stop offset="0" stop-color="#FFFFFF" stop-opacity=".78"/>
          <stop offset=".16" stop-color="#B26CFF" stop-opacity=".88"/>
          <stop offset=".58" stop-color="#B26CFF" stop-opacity=".24"/>
