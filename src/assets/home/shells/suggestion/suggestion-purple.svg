        <rect x="13" y="13" width="404" height="124" rx="25"
              fill="url(#toneGlow)" stroke="#FFFFFF" stroke-opacity=".09" stroke-width="1"/>
        <path d="M 35 12 H 382"
              stroke="#FFFFFF" stroke-opacity=".32" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M 412 48 V 100"
              stroke="#B26CFF" stroke-opacity=".34" stroke-width="2" stroke-linecap="round"/>
        <path d="M 48 135 H 390"
              stroke="#B26CFF" stroke-opacity=".50" stroke-width="2.2" stroke-linecap="round"/>
        
        <g>
          <rect x="25" y="33" width="84" height="84" rx="23.5"
